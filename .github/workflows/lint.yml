name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: {}

jobs:
  spotless:
    name: Spotless (ktlint + prettier)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Loom requires the Gradle build to run on JVM 21+.
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
      # Spotless formats JSON via prettier, which runs through npm.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Check formatting
        run: ./gradlew spotlessCheck

  detekt:
    name: Detekt (static analysis)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Only the 2.0 alpha line supports Kotlin 2.3.x; run it via the CLI so it
      # stays decoupled from the project's Gradle 8.x / Loom toolchain.
      DETEKT_VERSION: 2.0.0-alpha.3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download detekt CLI
        run: |
          curl -sSL -o detekt-cli.jar \
            "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}-all.jar"
      - name: Run detekt
        run: |
          SRCS=$(find . -type d \( -path "*/src/main/kotlin" -o -path "*/src/client/kotlin" \) \
            -not -path "*/build/*" -not -path "./buildSrc/*" | sed 's|^\./||' | paste -sd: -)
          echo "Analyzing: $SRCS"
          java -jar detekt-cli.jar \
            --input "$SRCS" \
            --language-version 2.3 \
            --baseline config/detekt/baseline.xml
